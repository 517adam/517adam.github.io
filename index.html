<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }
        header {
            background-color: #0073e6;
            color: white;
            padding: 10px 0;
            text-align: center;
        }
        nav {
            margin: 20px;
            text-align: center;
        }
        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #0073e6;
        }
        section {
            margin: 20px;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        footer {
            text-align: center;
            padding: 10px 0;
            background-color: #0073e6;
            color: white;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>欢迎来到我的个人主页</h1>
    </header>

    <nav>
        <a href="#about">关于我</a>
        <a href="#portfolio">作品集</a>
        <a href="#contact">联系我</a>
    </nav>

    <section id="about">
        <h2>关于我</h2>
        <p>你好！我是一名网页开发者和设计师，热衷于创造美观且功能强大的网站。</p>
    </section>

    <section id="portfolio">
        <h2>作品集</h2>
        <p>这里展示了我的一些项目和工作案例。</p>
        <!-- 您可以在这里添加更多项目内容 -->

    <section id="contact">
        <h2>联系我</h2>
        <p>您可以通过以下方式联系我：</p>
        <ul>
            <li>Email: example@example.com</li>
            <li>电话: 123-456-7890</li>
        </ul>
    </section>

    <footer>
        <p>&copy; 2023 我的个人主页. 保留所有权利。</p>
    </footer>

</body>
</html>
